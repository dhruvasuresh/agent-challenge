<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MEV Protection Suite Metrics Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
    h1 { text-align: center; color: #333; }
    .metrics { display: flex; justify-content: space-between; margin-bottom: 24px; }
    .metric { background: #f0f0f0; border-radius: 6px; padding: 16px 24px; text-align: center; flex: 1; margin: 0 8px; }
    .metric h2 { margin: 0 0 8px 0; font-size: 1.2em; color: #555; }
    .metric span { font-size: 2em; color: #0077cc; }
    .alerts { margin-top: 32px; }
    .alerts h3 { margin-bottom: 12px; color: #444; }
    .alert-list { list-style: none; padding: 0; }
    .alert-list li { background: #ffeaea; color: #b30000; border-left: 4px solid #b30000; margin-bottom: 8px; padding: 8px 12px; border-radius: 4px; font-size: 0.98em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MEV Protection Suite Metrics</h1>
    <div class="metrics">
      <div class="metric">
        <h2>Transactions</h2>
        <span id="txCount">0</span>
      </div>
      <div class="metric">
        <h2>MEV Risks</h2>
        <span id="mevCount">0</span>
      </div>
      <div class="metric">
        <h2>Alerts Sent</h2>
        <span id="alertCount">0</span>
      </div>
    </div>
    <div class="alerts">
      <h3>Recent Alerts</h3>
      <ul class="alert-list" id="alertList"></ul>
    </div>
  </div>
  <script>
    async function fetchMetrics() {
      const res = await fetch('http://localhost:8090/api/metrics');
      const data = await res.json();
      document.getElementById('txCount').textContent = data.totalTransactionsAnalyzed;
      document.getElementById('mevCount').textContent = data.totalMEVRisksDetected;
      document.getElementById('alertCount').textContent = data.totalAlertsSent;
      const alertList = document.getElementById('alertList');
      alertList.innerHTML = '';
      (data.recentAlerts || []).forEach(msg => {
        const li = document.createElement('li');
        li.textContent = msg;
        alertList.appendChild(li);
      });
    }
    fetchMetrics();
    setInterval(fetchMetrics, 3000);
  </script>
</body>
</html>
